services:
  postgres:
    image: postgres:16-alpine
    container_name: dsb_postgres
    environment:
      POSTGRES_USER: hillmantam
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: pprfs_vetting
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hillmantam -d pprfs_vetting"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dsb_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: vansonhk/dsb-backend:3rd-round
    container_name: dsb_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hillmantam@postgres:5432/pprfs_vetting
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8043"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    image: vansonhk/dsb-backend:3rd-round
    container_name: dsb_celery
    command: celery -A celery_app worker --loglevel=info -c 2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hillmantam@postgres:5432/pprfs_vetting
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: vansonhk/dsb-frontend:3rd-round
    container_name: dsb_frontend
    env_file: .env
    environment:
      PORT: "7676"
      HOSTNAME: "0.0.0.0"
    expose:
      - "7676"
    depends_on:
      - backend
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: dsb_gateway
    ports:
      - "${APP_PORT:-7676}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
